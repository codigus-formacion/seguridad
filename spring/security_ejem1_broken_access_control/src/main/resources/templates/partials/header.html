<!DOCTYPE html>
<html lang="es">

<head>
  <title>Post App</title>
  <meta charset="UTF-8">
  <base href=".">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background-color: #f8f9fa; }
  </style>
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">&#128209; Post App</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        {{^logged}}
        <form action="/login" method="post" class="d-flex ms-auto gap-2 align-items-center">
          <input type="text" class="form-control form-control-sm" name="username" placeholder="Username">
          <input type="password" class="form-control form-control-sm" name="password" placeholder="Password">
          <button type="submit" class="btn btn-primary btn-sm" style="min-width: 5em">Sign In</button>
          <input type="hidden" name="_csrf" value="{{token}}" />
        </form>
        {{/logged}}
        {{#logged}}
        <ul class="navbar-nav ms-auto align-items-center gap-2">
          <li class="nav-item">
            <span class="nav-link text-white-50">&#128100; {{userName}}</span>
          </li>
          <li class="nav-item">
            <form action="/logout" method="post">
              <button class="btn btn-outline-light btn-sm" type="submit">Log Out</button>
              <input type="hidden" name="_csrf" value="{{token}}" />
            </form>
          </li>
        </ul>
        {{/logged}}
      </div>
    </div>
  </nav>

  <div class="container mt-4">
