{{>partials/header}}

<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow-sm">
      <div class="card-header bg-warning text-dark">
        <h4 class="mb-0"> Edit Post "{{post.title}}"</h4>
      </div>
      <div class="card-body">
        <form action="/editpost" method="post">
          <input type="hidden" name="id" value="{{post.id}}"/>
          <div class="mb-3">
            <label class="form-label fw-bold">Title</label>
            <input name="title" class="form-control" value="{{post.title}}" placeholder="title"/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Content</label>
            <textarea name="text" class="form-control" rows="6" placeholder="text">{{post.text}}</textarea>
          </div>
          <input type="hidden" name="_csrf" value="{{token}}"/>
          <div class="d-flex gap-2">
            <button type="button" class="btn btn-secondary" onclick="location.href='/posts/{{post.id}}'">Cancel</button>
            <button type="submit" class="btn btn-warning text-dark fw-bold">Save Changes</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

{{>partials/footer}}
