{{>partials/header}}

<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white">
        <h4 class="mb-0">&#128221; New Post</h4>
      </div>
      <div class="card-body">
        <form action="/newpost" method="post">
          <div class="mb-3">
            <label class="form-label fw-bold">Title</label>
            <input name="title" class="form-control" placeholder="Enter a title..."/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Content</label>
            <textarea name="text" class="form-control" rows="6" placeholder="Write your post here..."></textarea>
          </div>
          <input type="hidden" name="_csrf" value="{{token}}"/>
          <div class="d-flex gap-2">
            <button type="button" class="btn btn-secondary" onclick="location.href='/'">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Post</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

{{>partials/footer}}
