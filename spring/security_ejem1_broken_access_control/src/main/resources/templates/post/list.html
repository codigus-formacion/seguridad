{{>partials/header}}

<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="mb-0">Posts</h2>
  {{#logged}}
  <a href="/newpost" class="btn btn-success">&#43; New Post</a>
  {{/logged}}
</div>

{{^posts}}
<div class="alert alert-info">No posts yet. Be the first to create one!</div>
{{/posts}}

<div class="list-group shadow-sm">
  {{#posts}}
  <a href="/posts/{{id}}" class="list-group-item list-group-item-action">
    &#128196; {{title}}
  </a>
  {{/posts}}
</div>

{{>partials/footer}}
